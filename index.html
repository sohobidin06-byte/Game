<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Car</title>

<style>
body{margin:0;overflow:hidden;background:#87ceeb}
#score{position:absolute;top:10px;width:100%;text-align:center;font-size:40px;color:white}
</style>
</head>

<body>

<div id="score">0</div>

<script type="importmap">
{
"imports":{
"three":"https://unpkg.com/three@0.160.0/build/three.module.js"
}
}
</script>

<script type="module">
import * as THREE from "three";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,5,12);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));

const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(0,20,10);
scene.add(sun);

const road = new THREE.Mesh(
new THREE.PlaneGeometry(10,2000),
new THREE.MeshStandardMaterial({color:0x333333})
);

road.rotation.x=-Math.PI/2;
scene.add(road);

function createCar(color){

const car = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(1.6,0.5,3.2),
new THREE.MeshStandardMaterial({color})
);

body.position.y=0.6;
car.add(body);

const cabin = new THREE.Mesh(
new THREE.BoxGeometry(1.2,0.6,1.4),
new THREE.MeshStandardMaterial({color:0x111111})
);

cabin.position.set(0,1.1,0.2);
car.add(cabin);

const wGeo = new THREE.CylinderGeometry(0.4,0.4,0.4,12);
const wMat = new THREE.MeshStandardMaterial({color:0x000000});

const frontWheels=[];

[[0.85,0.4,1],[-0.85,0.4,1],[0.85,0.4,-1],[-0.85,0.4,-1]].forEach((p,i)=>{

const w = new THREE.Mesh(wGeo,wMat);

w.rotation.z=Math.PI/2;

w.position.set(...p);

car.add(w);

if(i<2) frontWheels.push(w);

});

car.userData.frontWheels=frontWheels;

return car;

}

const player=createCar(0xe74c3c);

scene.add(player);

let targetX=0;

document.addEventListener("keydown",(e)=>{

if(e.key==="ArrowLeft") targetX=-3;

if(e.key==="ArrowRight") targetX=3;

});

function animate(){

requestAnimationFrame(animate);

player.position.x += (targetX-player.position.x)*0.1;

player.rotation.y = (player.position.x-targetX)*0.05;

const steerAngle=(player.position.x-targetX)*-0.5;

player.userData.frontWheels.forEach(w=>{

w.rotation.y=steerAngle;

});

camera.lookAt(player.position);

renderer.render(scene,camera);

}

animate();

window.onresize=()=>{

camera.aspect=window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

};

</script>

</body>
</html>
